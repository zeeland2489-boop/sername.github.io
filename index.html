<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome App 📑</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-top">
          <h1 class="title">🌟 Welcome to Our App</h1>
          <div class="auth-buttons" id="authButtons">
            <button onclick="showLoginModal()" class="btn btn-outline">Login</button>
            <button onclick="showRegisterModal()" class="btn btn-primary">Sign Up</button>
          </div>
          <div class="user-menu" id="userMenu" style="display:none;">
            <span id="userName"></span>
            <button onclick="logout()" class="btn btn-outline">Logout</button>
          </div>
        </div>
        <p id="currentTime" class="time-display"></p>
      </header>

      <main>
        <section class="content-section">
          <h2>Get in Touch</h2>
          <form action="https://formspree.io/f/mrewlnqn" method="POST" class="contact-form">
            <div class="form-group">
              <input type="text" name="name" placeholder="Your Name" required />
            </div>
            <div class="form-group">
              <input type="email" name="email" placeholder="your@email.com" required />
            </div>
            <div class="form-group">
              <input type="text" name="subject" placeholder="Subject" required />
            </div>
            <div class="form-group">
              <textarea name="message" placeholder="Your message..." required></textarea>
            </div>
            <input type="text" name="_gotcha" style="display:none" />
            <div class="custom-honeypot">
              <input type="text" name="contact_time" autocomplete="off" tabindex="-1" />
            </div>
            <input type="hidden" name="_next" value="https://your-site.com/thank-you" />
            <button type="submit" class="btn btn-primary">Send Message</button>
          </form>
        </section>

        <section class="features">
          <h2>Features</h2>
          <div class="feature-grid">
            <div class="feature-card">
              <span class="feature-icon">💬</span>
              <h3>Live Chat</h3>
              <p>Chat with us in real-time</p>
            </div>
            <div class="feature-card">
              <span class="feature-icon">⏰</span>
              <h3>Real-time Clock</h3>
              <p>Always know the current time</p>
            </div>
            <div class="feature-card">
              <span class="feature-icon">📎</span>
              <h3>File Sharing</h3>
              <p>Share images, videos & documents</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal hidden">
      <div class="modal-content">
        <button onclick="closeLoginModal()" class="close-btn">✕</button>
        <h2>Login</h2>
        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <input type="email" id="loginEmail" placeholder="Email" required />
          </div>
          <div class="form-group">
            <input type="password" id="loginPassword" placeholder="Password" required />
          </div>
          <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <p>Don't have an account? <a href="#" onclick="switchToRegister()">Sign up</a></p>
        <div id="loginError" class="error-message"></div>
      </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" class="modal hidden">
      <div class="modal-content">
        <button onclick="closeRegisterModal()" class="close-btn">✕</button>
        <h2>Sign Up</h2>
        <form id="registerForm" class="auth-form">
          <div class="form-group">
            <input type="text" id="registerName" placeholder="Full Name" required />
          </div>
          <div class="form-group">
            <input type="email" id="registerEmail" placeholder="Email" required />
          </div>
          <div class="form-group">
            <input type="password" id="registerPassword" placeholder="Password (min 6 chars)" required />
          </div>
          <div class="form-group">
            <input type="password" id="registerConfirm" placeholder="Confirm Password" required />
          </div>
          <button type="submit" class="btn btn-primary">Sign Up</button>
        </form>
        <p>Already have an account? <a href="#" onclick="switchToLogin()">Login</a></p>
        <div id="registerError" class="error-message"></div>
      </div>
    </div>

    <button id="chatToggle" onclick="toggleChat()" class="chat-toggle">💬 Chat</button>
    <div id="chatSection" class="hidden chat-box">
      <div id="chatHeader" class="chat-header">
        <span>💬 Chat Box</span>
        <button onclick="toggleChat()" class="close-btn">✕</button>
      </div>
      <div id="chatMessages" class="chat-messages"></div>
      <div id="chatInputContainer" class="chat-input-container">
        <input type="text" id="chatInput" placeholder="Type a message..." class="chat-input" />
        <input type="file" id="chatFile" style="display:none;" accept="image/*,video/*,.pdf,.doc,.docx" />
        <button type="button" onclick="document.getElementById('chatFile').click()" title="Attach file" class="btn btn-icon">📎</button>
        <button onclick="sendMessage()" class="btn btn-icon">Send</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
