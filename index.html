<!DOCTYPE html>
<html>
  <head>
    <title>Chat Application</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="loginPage" class="page">
      <div class="login-container">
        <h1>💬 Chat Room</h1>
        <input type="text" id="userId" placeholder="Enter Your User ID" />
        <button onclick="login()">Login</button>
      </div>
    </div>

    <div id="chatPage" class="page hidden">
      <div class="chat-wrapper">
        <!-- Sidebar Menu -->
        <div class="sidebar hidden" id="sidebar">
          <div class="sidebar-header">
            <h3>🔗 Menu</h3>
            <button class="close-sidebar" onclick="toggleSidebar()">✕</button>
          </div>
          <div id="menuLinks" class="menu-links"></div>
          <div class="add-menu-section hidden" id="addMenuSection">
            <h4>Add Menu Link</h4>
            <input type="text" id="menuTitle" placeholder="Link Title" />
            <input type="text" id="menuUrl" placeholder="URL or HTML" />
            <select id="menuType">
              <option value="url">Open URL</option>
              <option value="html">Show HTML</option>
            </select>
            <button onclick="addMenuLink()">Add Link</button>
            <button onclick="toggleAddMenu()" class="cancel-btn">Cancel</button>
          </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-container">
          <div class="header">
            <button class="menu-toggle" onclick="toggleSidebar()">☰ Menu</button>
            <h2>💬 Chat Room</h2>
            <span id="userDisplay"></span>
            <button onclick="logout()">🚪 Logout</button>
          </div>

          <div class="admin-panel hidden" id="adminPanel">
            <h3>⚙️ Admin Panel</h3>
            <div class="admin-section">
              <h4>➕ Add New Member</h4>
              <input type="text" id="newMemberId" placeholder="User ID" />
              <input type="text" id="newMemberName" placeholder="Username" />
              <input type="password" id="newMemberPass" placeholder="Password" />
              <button onclick="addMember()">Add Member</button>
            </div>
            
            <div class="admin-section">
              <h4>👥 Members List</h4>
              <ul id="membersList"></ul>
            </div>

            <div class="admin-section">
              <h4>🔗 Menu Management</h4>
              <button onclick="toggleAddMenu()">➕ Add Menu Link</button>
              <ul id="menuManageList"></ul>
            </div>
          </div>

          <div class="chat-box">
            <div id="messages" class="messages"></div>

            <div class="input-area">
              <input type="text" id="messageInput" placeholder="Type a message..." />
              <input type="file" id="fileInput" style="display:none" accept="*/*" />
              <button onclick="document.getElementById('fileInput').click()">📎 File</button>
              <button onclick="sendMessage()">📤 Send</button>
              <button id="adminBtn" class="hidden" onclick="toggleAdminPanel()">⚙️ Admin</button>
            </div>
          </div>
        </div>

        <!-- HTML Modal -->
        <div class="html-modal hidden" id="htmlModal">
          <div class="modal-content">
            <div class="modal-header">
              <h2 id="modalTitle"></h2>
              <button onclick="closeHtmlModal()" class="close-btn">✕</button>
            </div>
            <div id="modalBody" class="modal-body"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
